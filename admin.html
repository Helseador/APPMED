function _generarExcelVisitador(uid){
  var u=D.users.find(function(x){return x.id===uid;});
  if(!u){toast('Visitador no encontrado','err');return;}
  var desde=rptDesde;
  var hasta=rptHasta||today();
  if(!desde||desde===hasta){
    var d30=new Date();d30.setDate(d30.getDate()-29);
    desde=d30.toISOString().slice(0,10);
  }
  var visits=D.visits.filter(function(v){
    if((v.visitorId||v.userId)!==uid) return false;
    if(v.date<desde) return false;
    if(v.date>hasta) return false;
    return v.status==='completed';
  });
  var header=['Fecha','Tipo','Punto / Profesional','Especialidad','Telefono','Direccion','Obsequio','Firma','Notas','Jefe'];
  var rows=visits.map(function(v){
    var isProf=v.type==='profesional';
    return [v.date||'',isProf?'Profesional':'General',
      isProf?v.placeName||'':v.pointName||v.placeName||'',
      v.speciality||'',v.phone||'',isProf?v.address||'':v.direccion||'',
      v.gift||'',v.firma?'Si':'No',v.notes||'',v.jefe||''];
  });
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet([header].concat(rows));
  ws['!cols']=[{wch:12},{wch:12},{wch:30},{wch:18},{wch:14},{wch:28},{wch:20},{wch:6},{wch:28},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws,'Visitas');
  // Hoja de puntos
  var pts=D.points.filter(function(p){return p.assignedTo===uid;});
  var hPts=['Ruta','Orden','Punto','Direccion','Estado'];
  var rPts=pts.map(function(p){return [p.routeName||'Sin ruta',p.order||'',p.name||'',p.address||'',p.inactive?'Inactivo':'Activo'];});
  var ws2=XLSX.utils.aoa_to_sheet([hPts].concat(rPts));
  XLSX.utils.book_append_sheet(wb,ws2,'Puntos');
  // Hoja de pendientes
  var pends=D.pendientes.filter(function(p){return p&&p.userId===uid&&!p.eliminado;});
  var hPend=['Texto','Prioridad','Estado','Creado por','Fecha límite','Resuelto en'];
  var rPend=pends.map(function(p){return [p.texto||'',p.prioridad||'normal',p.resuelto?'Resuelto':'Activo',p.creadoPorNombre||'',p.fechaLimite||'',p.resueltoAt?p.resueltoAt.slice(0,10):''];});
  var ws3=XLSX.utils.aoa_to_sheet([hPend].concat(rPend));
  ws3['!cols']=[{wch:40},{wch:12},{wch:10},{wch:22},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws3,'Pendientes');
  // Hoja de ausencias
  var motivoLabel={incapacidad:'Incapacidad médica',calamidad:'Calamidad doméstica',cita_medica:'Cita médica',admin:'Autorizada por admin',otro:'Otro'};
  var aus=D.ausencias.filter(function(a){
    if(!a||a.userId!==uid) return false;
    if(a.fecha<desde) return false;
    if(a.fecha>hasta) return false;
    return true;
  });
  var hAus=['Fecha','Motivo','Detalle','Estado','Revisado por'];
  var rAus=aus.map(function(a){return [a.fecha||'',motivoLabel[a.motivo]||a.motivo||'',a.detalle||'',a.revisado?'Revisada':'Sin revisar',a.revisadoPor||''];});
  var ws4=XLSX.utils.aoa_to_sheet([hAus].concat(rAus));
  ws4['!cols']=[{wch:12},{wch:22},{wch:40},{wch:14},{wch:22}];
  XLSX.utils.book_append_sheet(wb,ws4,'Ausencias');
  XLSX.writeFile(wb,'Reporte_'+u.name.replace(/[^a-zA-Z0-9]/g,'_')+'_'+today()+'.xlsx');
}

function generarPPTXVisitador(uid){
  if(uid&&typeof uid==='object') uid=uid.dataset?uid.dataset.id:uid;
  window._pptxPendingUid=uid;
  toast('Generando PPTX...','ok');
  if(typeof PptxGenJS==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js';
    s.onload=function(){_generarPPTXVisitador(window._pptxPendingUid);};
    document.head.appendChild(s);
  } else { _generarPPTXVisitador(uid); }
}

function _generarPPTXVisitador(uid){
  var u=D.users.find(function(x){return x.id===uid;});
  if(!u){toast('Visitador no encontrado','err');return;}
  var lab=LABS.find(function(l){return l.id===u.labId;})||{name:'-',color:'#0303B5'};
  var desde=rptDesde||today();
  var hasta=rptHasta||today();
  var visits=D.visits.filter(function(v){
    return (v.visitorId||v.userId)===uid&&v.status==='completed'&&v.date>=desde&&v.date<=hasta;
  });
  var pts=D.points.filter(function(p){return p.assignedTo===uid;});

  var pptx=new PptxGenJS();
  pptx.layout='LAYOUT_WIDE';
  // Portada
  var s1=pptx.addSlide();
  s1.addShape(pptx.ShapeType.rect,{x:0,y:0,w:'100%',h:'100%',fill:{color:'1B3A6B'}});
  s1.addShape(pptx.ShapeType.rect,{x:0,y:4.8,w:'100%',h:0.825,fill:{color:lab.color.replace('#','')}});
  s1.addText('APPMED',{x:0.5,y:0.6,w:9,h:1,fontSize:48,bold:true,color:'FFFFFF',fontFace:'Arial Black'});
  s1.addText('Reporte semanal — '+esc(u.name),{x:0.5,y:1.7,w:9,h:0.5,fontSize:18,color:'CADCFC'});
  s1.addText('Laboratorio: '+esc(lab.name),{x:0.5,y:2.2,w:9,h:0.4,fontSize:14,color:'CADCFC'});
  s1.addText('Periodo: '+desde+' al '+hasta,{x:0.5,y:2.6,w:9,h:0.4,fontSize:14,color:'CADCFC'});
  s1.addText(visits.length+' visitas completadas · '+pts.length+' puntos asignados',{x:0.5,y:3.0,w:9,h:0.4,fontSize:14,color:'EDE9FE'});
  s1.addText('Generado: '+today()+' | '+currentUser.name,{x:0.5,y:5.05,w:9,h:0.3,fontSize:9,color:'8FAFD4'});

  // Tendencia diaria individual
  var d0=new Date(desde+'T00:00:00');var d1=new Date(hasta+'T00:00:00');
  var diff=Math.max(1,Math.round((d1-d0)/86400000)+1);
  if(diff>31){d0=new Date(d1.getTime()-30*86400000);diff=31;}
  var dates=[];for(var i=0;i<diff;i++){dates.push(new Date(d0.getTime()+i*86400000).toISOString().slice(0,10));}
  var trend=dates.map(function(dt){return visits.filter(function(v){return v.date===dt;}).length;});

  var s2=pptx.addSlide();
  s2.addShape(pptx.ShapeType.rect,{x:0,y:0,w:'100%',h:0.9,fill:{color:'0303B5'}});
  s2.addText('Tendencia de visitas — '+esc(u.name),{x:0.3,y:0.2,w:9,h:0.5,fontSize:16,bold:true,color:'FFFFFF'});
  var imgTrend=chartToImage({type:'line',data:{labels:dates.map(function(d){return fmtDate(d);}),
    datasets:[{label:'Visitas',data:trend,borderColor:lab.color,backgroundColor:lab.color+'33',fill:true,tension:0.3,pointRadius:3}]},
    options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}},1200,500);
  s2.addImage({data:imgTrend,x:0.6,y:1.1,w:12.1,h:3.6});

  // Detalle de visitas
  if(visits.length){
    var s3=pptx.addSlide();
    s3.addShape(pptx.ShapeType.rect,{x:0,y:0,w:'100%',h:0.9,fill:{color:'0303B5'}});
    s3.addText('Detalle de visitas ('+visits.length+')',{x:0.3,y:0.2,w:9,h:0.5,fontSize:16,bold:true,color:'FFFFFF'});
    var rows3=[[
      {text:'Fecha',options:{bold:true,fill:'0303B5',color:'FFFFFF',fontSize:9}},
      {text:'Tipo',options:{bold:true,fill:'0303B5',color:'FFFFFF',fontSize:9}},
      {text:'Punto / Profesional',options:{bold:true,fill:'0303B5',color:'FFFFFF',fontSize:9}},
      {text:'Jefe',options:{bold:true,fill:'0303B5',color:'FFFFFF',fontSize:9}},
      {text:'Notas',options:{bold:true,fill:'0303B5',color:'FFFFFF',fontSize:9}}
    ]];
    visits.slice(0,25).forEach(function(v,i){
      var bg=i%2===0?'EEEEFF':'FFFFFF';
      rows3.push([
        {text:v.date||'',options:{fill:bg,fontSize:9}},
        {text:v.type==='profesional'?'Prof.':'General',options:{fill:bg,fontSize:9}},
        {text:v.placeName||v.pointName||'',options:{fill:bg,fontSize:9}},
        {text:v.jefe||'-',options:{fill:bg,fontSize:9}},
        {text:(v.notes||'').substring(0,45),options:{fill:bg,fontSize:9}}
      ]);
    });
    s3.addTable(rows3,{x:0.3,y:1.05,w:12.7,fontSize:9});
  }

  pptx.writeFile({fileName:'Reporte_'+u.name.replace(/[^a-zA-Z0-9]/g,'_')+'_'+today()+'.pptx'});
}

function editarValorMarketing(fbKey,valorActual){
  if(currentUser.role!=='super'){toast('Solo el superadmin puede editar valores','err');return;}
  if(!fbKey){toast('No se puede identificar el registro','err');return;}
  var nuevo=prompt('Nuevo valor ($):',valorActual);
  if(nuevo===null) return;
  var val=parseFloat(nuevo);
  if(isNaN(val)||val<0){toast('Valor inválido','err');return;}
  db.ref('medvisit/marketing/'+fbKey+'/valor').set(val)
    .then(function(){toast('Valor actualizado');renderCurrentTab();})
    .catch(function(e){toast('Error: '+e.message,'err');});
}


var _infTipo='general';
var _infPeriodo='semanal';

function abrirModalInforme(){
  // Poblar visitadores
  var visitadores=D.users.filter(function(u){return u.role==='visitor'&&(!currentLabId||u.labId===currentLabId)&&u.active!==false;});
  var sel=document.getElementById('infVisitadorSelect');
  if(!visitadores.length){
    sel.innerHTML='<option value="">Sin visitadores</option>';
  } else {
    sel.innerHTML=visitadores.map(function(u){
      return '<option value="'+u.id+'">'+esc(u.name)+' ('+esc(getLabName(u.labId))+')</option>';
    }).join('');
  }
  setInfTipo('general');
  setInfPeriodo('semanal');
  openModal('modalInforme');
}

function setInfTipo(tipo){
  _infTipo=tipo;
  var bGen=document.getElementById('infTipoGeneral');
  var bInd=document.getElementById('infTipoIndividual');
  var grp=document.getElementById('infVisitadorGroup');
  if(tipo==='general'){
    bGen.style.background='var(--primary)';bGen.style.color='#fff';bGen.classList.remove('btn-outline');
    bInd.style.background='transparent';bInd.style.color='var(--fg)';bInd.classList.add('btn-outline');
    grp.style.display='none';
  } else {
    bInd.style.background='var(--primary)';bInd.style.color='#fff';bInd.classList.remove('btn-outline');
    bGen.style.background='transparent';bGen.style.color='var(--fg)';bGen.classList.add('btn-outline');
    grp.style.display='block';
  }
}

function setInfPeriodo(periodo){
  _infPeriodo=periodo;
  var bSem=document.getElementById('infPerSemanal');
  var bMes=document.getElementById('infPerMensual');
  var bPer=document.getElementById('infPerPersonalizado');
  var lbl=document.getElementById('infPeriodoLabel');
  var custom=document.getElementById('infFechasCustom');
  [bSem,bMes,bPer].forEach(function(b){if(b){b.style.background='transparent';b.style.color='var(--fg)';b.classList.add('btn-outline');}});
  if(periodo==='semanal'){
    bSem.style.background='var(--primary)';bSem.style.color='#fff';bSem.classList.remove('btn-outline');
    lbl.textContent='Últimos 7 días';
    if(custom) custom.style.display='none';
  } else if(periodo==='mensual'){
    bMes.style.background='var(--primary)';bMes.style.color='#fff';bMes.classList.remove('btn-outline');
    lbl.textContent='Últimos 30 días';
    if(custom) custom.style.display='none';
  } else {
    bPer.style.background='var(--primary)';bPer.style.color='#fff';bPer.classList.remove('btn-outline');
    lbl.textContent='Selecciona el rango';
    if(custom) custom.style.display='block';
    // Prellenar con mes actual
    var hoy=today();
    var d=new Date();d.setDate(1);
    var desdeEl=document.getElementById('infDesdeCustom');
    var hastaEl=document.getElementById('infHastaCustom');
    if(desdeEl&&!desdeEl.value) desdeEl.value=d.toISOString().slice(0,10);
    if(hastaEl&&!hastaEl.value) hastaEl.value=hoy;
  }
}

function ejecutarInforme(formato){
  var hoy=today();
  if(_infPeriodo==='semanal'){
    var d=new Date();d.setDate(d.getDate()-6);
    rptDesde=d.toISOString().slice(0,10);
    rptHasta=hoy;
  } else if(_infPeriodo==='mensual'){
    var d=new Date();d.setDate(d.getDate()-29);
    rptDesde=d.toISOString().slice(0,10);
    rptHasta=hoy;
  } else {
    rptDesde=document.getElementById('infDesdeCustom').value;
    rptHasta=document.getElementById('infHastaCustom').value;
    if(!rptDesde||!rptHasta){toast('Selecciona las fechas del rango','err');return;}
    if(rptDesde>rptHasta){toast('La fecha inicial no puede ser mayor que la final','err');return;}
  }

  if(_infTipo==='general'){
    var labId=currentLabId||null;
    if(formato==='excel') generarExcel(labId);
    else generarPPTX(labId);
  } else {
    var uid=document.getElementById('infVisitadorSelect').value;
    if(!uid){toast('Selecciona un visitador','err');return;}
    if(formato==='excel') generarExcelVisitador(uid);
    else generarPPTXVisitador(uid);
  }
  closeModal('modalInforme');
}

// ── MODAL HELPERS ──────────────────────────────────────────────
function openModal(id){
  var el=document.getElementById(id);
  if(el){el.classList.add('open');document.body.style.overflow='hidden';}
}
function closeModal(id){
  var el=document.getElementById(id);
  if(el){el.classList.remove('open');document.body.style.overflow='';}
}

</script>
