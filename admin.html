<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0303B5">
  <title>APPMED Admin</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://appmed-helse-default-rtdb.firebaseio.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root{
      --primary:#0303B5;
      --primary-dark:#020280;
      --primary-light:#3B3FD8;
      --primary-50:#EEEEFF;
      --bg:#F8FAFC;
      --card:#FFFFFF;
      --fg:#0F172A;
      --muted:#64748B;
      --border:#E2E8F0;
      --danger:#DC2626;
      --success:#16A34A;
      --warning:#D97706;
      --radius:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;}

    /* HEADER */
    .app-header{
      background:var(--primary);
      color:#fff;
      padding:0 16px;
      height:56px;
      display:flex;
      align-items:center;
      gap:10px;
      position:sticky;
      top:0;
      z-index:100;
      box-shadow:0 2px 12px rgba(3,3,181,0.3);
    }
    .app-header h1{font-size:18px;font-weight:800;letter-spacing:0.5px;flex:1;}
    .header-badge{background:rgba(255,255,255,0.15);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
    .header-btn{background:rgba(255,255,255,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
    .header-btn:hover{background:rgba(255,255,255,0.25);}

    /* LOGIN */
    .login-wrap{
      min-height:100vh;
      background:linear-gradient(160deg,#0303B5 0%,#020280 50%,#1B3A6B 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .login-card{
      background:#fff;
      border-radius:24px;
      padding:40px 32px;
      width:100%;
      max-width:380px;
      box-shadow:0 25px 60px rgba(3,3,181,0.3);
    }
    .login-logo{text-align:center;margin-bottom:28px;}
    .login-logo .logo-text{font-size:36px;font-weight:900;color:var(--primary);letter-spacing:-1px;}
    .login-logo .logo-sub{font-size:13px;color:var(--muted);margin-top:2px;}
    .login-logo .admin-badge{display:inline-block;background:var(--primary-50);color:var(--primary);font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;margin-top:6px;}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:13px;font-weight:600;color:var(--fg);margin-bottom:6px;}
    .form-input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:12px;font-size:15px;outline:none;transition:border-color 0.2s;}
    .form-input:focus{border-color:var(--primary);}
    .login-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;transition:background 0.2s;}
    .login-btn:hover{background:var(--primary-dark);}
    .login-error{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;min-height:20px;}

    /* LAYOUT */
    .screen{display:none;}
    .screen.active{display:block;}
    .app-body{padding:16px;max-width:1200px;margin:0 auto;}

    /* TABS */
    .tabs{display:flex;gap:4px;padding:0 16px;background:var(--primary-dark);overflow-x:auto;}
    .tab-btn{
      background:transparent;border:none;color:rgba(255,255,255,0.65);
      padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;
      border-bottom:3px solid transparent;white-space:nowrap;
      transition:all 0.2s;display:flex;align-items:center;gap:6px;
    }
    .tab-btn:hover{color:#fff;}
    .tab-btn.active{color:#fff;border-bottom-color:#fff;}
    .tab-content{display:none;padding:16px 0;}
    .tab-content.active{display:block;}

    /* CARDS */
    .card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:12px;}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .card-title{font-size:15px;font-weight:700;}

    /* STATS */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
    .stat-card{
      background:var(--card);border-radius:var(--radius);padding:16px;
      box-shadow:0 1px 4px rgba(0,0,0,0.06);text-align:center;
      border-top:4px solid var(--primary);
    }
    .stat-num{font-size:32px;font-weight:900;color:var(--primary);}
    .stat-label{font-size:12px;color:var(--muted);margin-top:2px;}

    /* TABLA */
    .data-table{width:100%;border-collapse:collapse;font-size:13px;}
    .data-table th{background:var(--primary);color:#fff;padding:10px 12px;text-align:left;font-weight:600;}
    .data-table td{padding:10px 12px;border-bottom:1px solid var(--border);}
    .data-table tr:hover td{background:var(--primary-50);}
    .table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);}

    /* FILTROS */
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
    .filters select,.filters input{
      padding:8px 12px;border:2px solid var(--border);border-radius:10px;
      font-size:13px;outline:none;background:var(--card);
    }
    .filters select:focus,.filters input:focus{border-color:var(--primary);}

    /* BADGES */
    .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;}
    .badge-ok{background:#DCFCE7;color:#16A34A;}
    .badge-warn{background:#FEF3C7;color:#D97706;}
    .badge-err{background:#FEE2E2;color:#DC2626;}
    .badge-info{background:var(--primary-50);color:var(--primary);}

    /* BUTTONS */
    .btn{padding:8px 16px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
    .btn-primary{background:var(--primary);color:#fff;}
    .btn-primary:hover{background:var(--primary-dark);}
    .btn-success{background:#16A34A;color:#fff;}
    .btn-outline{background:transparent;border:2px solid var(--border);color:var(--fg);}
    .btn-sm{padding:6px 12px;font-size:12px;}

    /* AVATAR */
    .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0;}

    /* EMPTY */
    .empty{text-align:center;padding:40px;color:var(--muted);}
    .empty i{font-size:40px;margin-bottom:12px;opacity:0.3;}

    /* FOTO OVERLAY */
    .foto-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;}
    .foto-overlay.open{display:flex;}
    .foto-overlay img{max-width:95%;max-height:85vh;border-radius:12px;}
    .foto-overlay .close-hint{color:rgba(255,255,255,0.5);font-size:12px;margin-top:10px;}

    /* LOADING */
    .loading{text-align:center;padding:40px;color:var(--muted);}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* RESPONSIVE */
    @media(max-width:600px){
      .stats-grid{grid-template-columns:repeat(2,1fr);}
      .app-body{padding:12px;}
    }

    /* MODAL OVERLAY */
    .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.6);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal-box{background:var(--card);border-radius:18px;padding:28px 24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;transform:scale(0.95);transition:transform .25s;box-shadow:0 25px 60px rgba(0,0,0,0.2);}
    .modal-overlay.open .modal-box{transform:scale(1);}
    .modal-title{font-size:17px;font-weight:800;margin-bottom:20px;color:var(--fg);}
    .modal-actions{display:flex;gap:10px;margin-top:20px;}
    .modal-actions .btn{flex:1;}

    /* CONFIRM OVERLAY */
    .confirm-overlay{position:fixed;inset:0;background:rgba(15,23,42,0.7);backdrop-filter:blur(4px);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
    .confirm-overlay.open{opacity:1;pointer-events:all;}
    .confirm-box{background:var(--card);border-radius:18px;padding:28px 24px;width:100%;max-width:360px;text-align:center;transform:scale(0.95);transition:transform .25s;box-shadow:0 25px 60px rgba(0,0,0,0.2);}
    .confirm-overlay.open .confirm-box{transform:scale(1);}
    .confirm-icon{width:52px;height:52px;border-radius:50%;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:22px;}
    .confirm-icon.danger{background:#FEE2E2;color:var(--danger);}
    .confirm-icon.warning{background:#FEF3C7;color:#D97706;}
  </style>
</head>
<body>
<!-- TOAST WRAP -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- CONFIRM OVERLAY -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon danger" id="confirmIcon"><i id="confirmIconI" class="fa-solid fa-triangle-exclamation"></i></div>
    <div style="font-size:16px;font-weight:800;margin-bottom:8px;" id="confirmTitle"></div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px;" id="confirmMsg"></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-outline" style="flex:1;" onclick="cancelConfirm()">Cancelar</button>
      <button class="btn btn-danger" style="flex:1;" id="confirmOkBtn" onclick="executeConfirm()">Confirmar</button>
    </div>
  </div>
</div>


<!-- FOTO OVERLAY -->
<div class="foto-overlay" id="fotoOverlay" onclick="this.classList.remove('open')">
  <img id="fotoOverlayImg" src="" alt="">
  <div class="close-hint">Toca para cerrar</div>
</div>

<!-- MODAL: NUEVO/EDITAR USUARIO -->
<div class="modal-overlay" id="modalUsuario">
  <div class="modal-box">
    <div class="modal-title" id="modalUsuarioTitle">Nuevo usuario</div>
    <input type="hidden" id="mu-id">
    <div class="form-group">
      <label class="form-label">Nombre completo</label>
      <input class="form-input" id="mu-name" placeholder="Ej: Juan Perez Garcia">
    </div>
    <div class="form-group">
      <label class="form-label">Usuario</label>
      <input class="form-input" id="mu-username" placeholder="Ej: jperez" autocapitalize="off">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña <span id="mu-pass-hint" style="font-size:11px;color:var(--muted);font-weight:400;">(dejar vacío para no cambiar)</span></label>
      <input class="form-input" id="mu-password" type="text" placeholder="Mínimo 4 caracteres">
    </div>
    <div class="form-group" id="mu-rol-group">
      <label class="form-label">Rol</label>
      <select class="form-input" id="mu-role" onchange="onMuRoleChange()">
        <option value="visitor">Visitador</option>
        <option value="admin">Administrador</option>
        <option value="adminGeneral">Admin General</option>
        <option value="contador">Contador</option>
      </select>
    </div>
    <div class="form-group" id="mu-lab-group">
      <label class="form-label">Laboratorio</label>
      <select class="form-input" id="mu-lab"></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modalUsuario')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveUsuario()"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL: NUEVO/EDITAR LABORATORIO -->
<div class="modal-overlay" id="modalLab">
  <div class="modal-box">
    <div class="modal-title" id="modalLabTitle">Nuevo laboratorio</div>
    <input type="hidden" id="ml-id">
    <div class="form-group">
      <label class="form-label">Nombre del laboratorio</label>
      <input class="form-input" id="ml-name" placeholder="Ej: Bayer, Pfizer...">
    </div>
    <div class="form-group">
      <label class="form-label">Color</label>
      <div class="color-picker" id="ml-color-picker"></div>
      <input type="hidden" id="ml-color" value="#0303B5">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modalLab')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveLab()"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL: NUEVO/EDITAR PUNTO -->
<div class="modal-overlay" id="modalPunto">
  <div class="modal-box">
    <div class="modal-title" id="modalPuntoTitle">Nuevo punto</div>
    <input type="hidden" id="mp-id">
    <div class="form-group">
      <label class="form-label">Visitador asignado</label>
      <select class="form-input" id="mp-visitor"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre del punto</label>
      <input class="form-input" id="mp-name" placeholder="Ej: Farmacia San Rafael">
    </div>
    <div class="form-group">
      <label class="form-label">Nombre de ruta</label>
      <input class="form-input" id="mp-route" placeholder="Ej: Ruta Soacha">
    </div>
    <div class="form-group">
      <label class="form-label">Dirección completa</label>
      <input class="form-input" id="mp-address" placeholder="Cra 7 #45-20, Bogotá...">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-group">
        <label class="form-label">Orden en ruta</label>
        <input class="form-input" type="number" id="mp-order" placeholder="1, 2..." min="1">
      </div>
      <div class="form-group">
        <label class="form-label">Latitud</label>
        <input class="form-input" id="mp-lat" placeholder="4.71...">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Longitud</label>
      <input class="form-input" id="mp-lng" placeholder="-74.07...">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modalPunto')">Cancelar</button>
      <button class="btn btn-primary" onclick="savePunto()"><i class="fa-solid fa-floppy-disk"></i> Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL: GENERAR INFORME -->
<div class="modal-overlay" id="modalInforme">
  <div class="modal-box" style="max-width:480px;">
    <div class="modal-title"><i class="fa-solid fa-chart-line" style="color:var(--primary);margin-right:8px;"></i>Generar informe</div>

    <div class="form-group">
      <label class="form-label">Tipo de informe</label>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-sm" id="infTipoGeneral" style="flex:1;background:var(--primary);color:#fff;" onclick="setInfTipo('general')"><i class="fa-solid fa-globe"></i> General</button>
        <button class="btn btn-sm btn-outline" id="infTipoIndividual" style="flex:1;" onclick="setInfTipo('individual')"><i class="fa-solid fa-user"></i> Individual</button>
      </div>
    </div>

    <div class="form-group" id="infVisitadorGroup" style="display:none;">
      <label class="form-label">Visitador</label>
      <select class="form-input" id="infVisitadorSelect"></select>
    </div>

    <div class="form-group">
      <label class="form-label">Periodo</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-sm" id="infPerSemanal" style="flex:1;background:var(--primary);color:#fff;" onclick="setInfPeriodo('semanal')"><i class="fa-solid fa-calendar-week"></i> Semanal</button>
        <button class="btn btn-sm btn-outline" id="infPerMensual" style="flex:1;" onclick="setInfPeriodo('mensual')"><i class="fa-solid fa-calendar"></i> Mensual</button>
        <button class="btn btn-sm btn-outline" id="infPerPersonalizado" style="flex:1;" onclick="setInfPeriodo('personalizado')"><i class="fa-solid fa-sliders"></i> Personalizado</button>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px;" id="infPeriodoLabel">Últimos 7 días</div>
      <div id="infFechasCustom" style="display:none;margin-top:10px;display:none;">
        <div style="display:flex;gap:8px;align-items:center;">
          <div style="flex:1;"><label class="form-label">Desde</label><input class="form-input" type="date" id="infDesdeCustom"></div>
          <div style="flex:1;"><label class="form-label">Hasta</label><input class="form-input" type="date" id="infHastaCustom"></div>
        </div>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modalInforme')">Cancelar</button>
      <button class="btn btn-success" onclick="ejecutarInforme('excel')"><i class="fa-solid fa-file-excel"></i> Excel</button>
      <button class="btn" style="background:#7C3AED;color:#fff;" onclick="ejecutarInforme('pptx')"><i class="fa-solid fa-file-powerpoint"></i> PPTX</button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div class="login-wrap" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo-helse.png" alt="APPMED" style="width:180px;height:auto;margin-bottom:4px;" onerror="this.style.display='none';document.getElementById('logoText').style.display='block'"><div id="logoText" class="logo-text" style="display:none;">APPMED</div>
      <div class="logo-sub">by HELSE Colombia</div>
      <div class="admin-badge"><i class="fa-solid fa-shield-halved"></i> Panel Administrativo</div>
    </div>
    <div class="form-group">
      <label class="form-label">Usuario</label>
      <input class="form-input" id="loginUser" type="text" placeholder="Tu usuario" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input class="form-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> Ingresar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- PANEL ADMIN -->
<div class="screen" id="adminScreen">
  <div class="app-header">
    <div style="flex:1;">
      <div style="font-weight:800;font-size:16px;">APPMED Admin</div>
      <div style="font-size:11px;opacity:0.7;" id="userLabel">Cargando...</div>
    </div>
    <div class="header-badge" id="connBadge"><i class="fa-solid fa-circle" style="font-size:8px;"></i> Online</div>
    <button class="header-btn" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i></button>
  </div>
  <div class="tabs" id="adminTabs"></div>
  <div class="app-body">
    <div id="tabContent"></div>
  </div>
</div>

<script>
var FIREBASE_CONFIG={apiKey:"AIzaSyAx8FiXFZutVSDqHrh5ANKfoZlBZTRB2ic",authDomain:"appmed-helse.firebaseapp.com",databaseURL:"https://appmed-helse-default-rtdb.firebaseio.com",projectId:"appmed-helse",storageBucket:"appmed-helse.firebasestorage.app",messagingSenderId:"116820385584",appId:"1:116820385584:web:4857ff3653ac5bdfbf72f5"};
var SUPER_KEY='TesJua2024!';
var BASE_LABS=[
  {id:'nestle',name:'Nestlé',color:'#E2001A'},
  {id:'abamia',name:'Abamia',color:'#0066CC'},
  {id:'fresenius',name:'Fresenius',color:'#009036'},
  {id:'ketolance',name:'Ketolance',color:'#F59E0B'},
  {id:'abbott',name:'Abbott',color:'#009CDE'}
];
var LABS=BASE_LABS.slice();
var AV_COLORS=['#0303B5','#D97706','#DC2626','#7C3AED','#DB2777','#EA580C','#4F46E5','#0891B2'];

var db=null, currentUser=null, currentLabId=null;
var D={users:[],visits:[],points:[],pendientes:[],labs:[],marketing:[],ausencias:[]};

// ── UTILS ──────────────────────────────────────────────────────
function esc(s){if(!s) return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function today(){return new Date().toISOString().split('T')[0];}
function toArray(obj){
  if(!obj) return [];
  if(Array.isArray(obj)) return obj.filter(function(x){return x!=null;});
  return Object.keys(obj).map(function(k){var v=obj[k];if(v&&typeof v==='object') v._fbKey=k;return v;}).filter(function(x){return x!=null;});
}
function initials(n){if(!n) return '?';var p=n.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.substring(0,2).toUpperCase();}
function avatarColor(s){var h=0;for(var i=0;i<(s||'').length;i++) h=(h*31+s.charCodeAt(i))%AV_COLORS.length;return AV_COLORS[Math.abs(h)%AV_COLORS.length];}
function fmtDate(d){if(!d) return '-';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function getLabName(labId){var l=LABS.find(function(x){return x.id===labId;});return l?l.name:labId||'-';}
function getUserName(uid){var u=D.users.find(function(x){return x.id===uid;});return u?u.name:uid||'-';}
function openFoto(src){document.getElementById('fotoOverlayImg').src=src;document.getElementById('fotoOverlay').classList.add('open');}

// ── FIREBASE ──────────────────────────────────────────────────
function initFirebase(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    // Detectar online/offline
    db.ref('.info/connected').on('value',function(snap){
      var badge=document.getElementById('connBadge');
      if(!badge) return;
      if(snap.val()){
        badge.innerHTML='<i class="fa-solid fa-circle" style="font-size:8px;color:#4ADE80;"></i> Online';
      } else {
        badge.innerHTML='<i class="fa-solid fa-circle" style="font-size:8px;color:#FCA5A5;"></i> Offline';
      }
    });
    // Cargar datos
    db.ref('medvisit/users').on('value',function(snap){D.users=toArray(snap.val());render();});
    var _fechaLimiteAdmin=new Date();_fechaLimiteAdmin.setDate(_fechaLimiteAdmin.getDate()-30);
    var _fechaLimiteAdminStr=_fechaLimiteAdmin.toISOString().slice(0,10);
    var _fechaFoto=new Date();_fechaFoto.setDate(_fechaFoto.getDate()-7);
    var _fechaFotoStr=_fechaFoto.toISOString().slice(0,10);
    db.ref('medvisit/visits').orderByChild('date').startAt(_fechaLimiteAdminStr).on('value',function(snap){
      D.visits=toArray(snap.val()).map(function(v){
        if(v.date&&v.date<_fechaFotoStr){delete v.photo;delete v.firma;}
        return v;
      });
      render();
    },function(err){console.error('Error visits:',err);toast('No se pudieron cargar las visitas. Contacta soporte.','err');});
    db.ref('medvisit/points').on('value',function(snap){D.points=toArray(snap.val());render();});
    db.ref('medvisit/pendientes').on('value',function(snap){D.pendientes=toArray(snap.val()||[]);render();});
    db.ref('medvisit/ausencias').on('value',function(snap){D.ausencias=toArray(snap.val()||[]);render();});
    db.ref('medvisit/labs').on('value',function(snap){
      var extra=toArray(snap.val());
      LABS=BASE_LABS.slice().concat(extra.filter(function(l){return !BASE_LABS.some(function(b){return b.id===l.id;});}));
      render();
    });
    db.ref('medvisit/marketing').on('value',function(snap){D.marketing=toArray(snap.val());render();});
  }catch(e){console.error('Firebase error:',e);}
}

// ── RENDER DEBOUNCE ───────────────────────────────────────────
var _rt=null;
function render(){
  if(_rt) clearTimeout(_rt);
  _rt=setTimeout(function(){
    _rt=null;
    if(currentUser) renderCurrentTab();
  },500);
}

// ── LOGIN ─────────────────────────────────────────────────────
function doLogin(){
  var u=document.getElementById('loginUser').value.trim();
  var p=document.getElementById('loginPass').value;
  var err=document.getElementById('loginError');
  err.textContent='';
  if(!u||!p){err.textContent='Ingresa usuario y contraseña';return;}

  // SuperAdmin
  if(u==='superadmin'&&p===SUPER_KEY){
    currentUser={id:'__super__',role:'super',name:'Super Administrador',username:'superadmin'};
    enterAdmin();return;
  }
  // Buscar en usuarios
  var found=D.users.find(function(x){return x.username===u&&x.password===p&&x.active!==false;});
  if(!found){err.textContent='Usuario o contraseña incorrectos';return;}
  // Solo roles admin
  if(['visitor'].indexOf(found.role)>=0){err.textContent='Este panel es solo para administradores';return;}
  currentUser={id:found.id,role:found.role,name:found.name,username:found.username,labId:found.labId||''};
  currentLabId=found.role==='admin'?found.labId||null:null;
  // Guardar sesion
  try{localStorage.setItem('appmed_admin_session',JSON.stringify({userId:currentUser.id,ts:Date.now()}));}catch(e){}
  enterAdmin();
}

function enterAdmin(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminScreen').classList.add('active');
  document.getElementById('userLabel').textContent=currentUser.name+' · '+getRoleLabel(currentUser.role);
  buildTabs();
}

function getRoleLabel(r){
  return r==='super'?'Super Admin':r==='adminGeneral'?'Admin General':r==='admin'?'Administrador':r==='contador'?'Contador':'Usuario';
}

function doLogout(){
  try{localStorage.removeItem('appmed_admin_session');}catch(e){}
  currentUser=null;currentLabId=null;
  document.getElementById('adminScreen').classList.remove('active');
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}

// ── TABS ──────────────────────────────────────────────────────
var _currentTab='panel';
var _tabs={
  super:       [{id:'panel',icon:'fa-chart-pie',label:'Panel'},{id:'visitas',icon:'fa-route',label:'Visitas'},{id:'visitadores',icon:'fa-users',label:'Visitadores'},{id:'pendientes',icon:'fa-list-check',label:'Pendientes'},{id:'ausencias',icon:'fa-file-medical',label:'Ausencias'},{id:'marketing',icon:'fa-receipt',label:'Marketing'},{id:'informes',icon:'fa-chart-bar',label:'Informes'},{id:'usuarios',icon:'fa-screwdriver-wrench',label:'Gestión'}],
  adminGeneral:[{id:'panel',icon:'fa-chart-pie',label:'Panel'},{id:'visitas',icon:'fa-route',label:'Visitas'},{id:'visitadores',icon:'fa-users',label:'Visitadores'},{id:'pendientes',icon:'fa-list-check',label:'Pendientes'},{id:'ausencias',icon:'fa-file-medical',label:'Ausencias'},{id:'marketing',icon:'fa-receipt',label:'Marketing'},{id:'informes',icon:'fa-chart-bar',label:'Informes'}],
  admin:       [{id:'panel',icon:'fa-chart-pie',label:'Panel'},{id:'visitas',icon:'fa-route',label:'Visitas'},{id:'visitadores',icon:'fa-users',label:'Visitadores'},{id:'pendientes',icon:'fa-list-check',label:'Pendientes'},{id:'ausencias',icon:'fa-file-medical',label:'Ausencias'},{id:'marketing',icon:'fa-receipt',label:'Marketing'},{id:'informes',icon:'fa-chart-bar',label:'Informes'}],
  contador:    [{id:'marketing',icon:'fa-receipt',label:'Marketing'}]
};

function buildTabs(){
  var role=currentUser.role;
  var tabs=_tabs[role]||_tabs.admin;
  var html=tabs.map(function(t){
    return '<button class="tab-btn'+(t.id===_currentTab?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'
      +'<i class="fa-solid '+t.icon+'"></i>'+t.label+'</button>';
  }).join('');
  document.getElementById('adminTabs').innerHTML=html;
  // Si el tab actual no existe para este rol, ir al primero
  if(!tabs.find(function(t){return t.id===_currentTab;})){
    _currentTab=tabs[0].id;
    buildTabs();return;
  }
  renderCurrentTab();
}

function switchTab(id){
  if(id&&typeof id==='object') id=id.dataset?id.dataset.tab:id;
  _currentTab=id;
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){if(b.textContent.trim().toLowerCase()===id||b.onclick.toString().includes("'"+id+"'")) b.classList.add('active');});
  buildTabs();
}

function renderCurrentTab(){
  var el=document.getElementById('tabContent');
  if(!el) return;
  if(_currentTab==='panel') renderCanvasDashboard();
  else if(_currentTab==='visitas') el.innerHTML=renderVisitas();
  else if(_currentTab==='visitadores') el.innerHTML=renderVisitadores();
  else if(_currentTab==='pendientes') el.innerHTML=renderPendientes();
  else if(_currentTab==='ausencias') el.innerHTML=renderAusencias();
  else if(_currentTab==='marketing') el.innerHTML=renderMarketing();
  else if(_currentTab==='informes') renderInformes();
  else if(_currentTab==='usuarios') el.innerHTML=renderUsuarios();
}

// ── TAB VISITAS ───────────────────────────────────────────────
function renderVisitas(){
  var visits=D.visits.filter(function(v){
    if(currentLabId) return v.labId===currentLabId;
    return true;
  });
  // Stats hoy
  var hoy=today();
  var hoyVisitas=visits.filter(function(v){return v.date===hoy;});
  var completadas=hoyVisitas.filter(function(v){return v.status==='completed';}).length;
  var enCurso=hoyVisitas.filter(function(v){return v.status==='in-progress';}).length;

  var html='<div class="stats-grid">'
    +'<div class="stat-card"><div class="stat-num">'+completadas+'</div><div class="stat-label">Completadas hoy</div></div>'
    
    +'<div class="stat-card"><div class="stat-num">'+hoyVisitas.length+'</div><div class="stat-label">Iniciadas hoy</div></div>'
    +'<div class="stat-card"><div class="stat-num">'+visits.length+'</div><div class="stat-label">Total registros</div></div>'
    +'</div>';

  // Filtros (preservar selección previa del usuario en vez de resetear a hoy)
  if(typeof window._visFiltros==='undefined') window._visFiltros={desde:hoy,hasta:hoy,lab:'',vis:''};
  html+='<div class="filters">'
    +'<input type="date" id="fDesde" value="'+window._visFiltros.desde+'" onchange="window._visFiltros.desde=this.value;renderCurrentTab()">'
    +'<input type="date" id="fHasta" value="'+window._visFiltros.hasta+'" onchange="window._visFiltros.hasta=this.value;renderCurrentTab()">';
  if(!currentLabId){
    html+='<select id="fLab" onchange="window._visFiltros.lab=this.value;renderCurrentTab()"><option value="">Todos los labs</option>'
      +LABS.map(function(l){return '<option value="'+l.id+'"'+(l.id===window._visFiltros.lab?' selected':'')+'>'+esc(l.name)+'</option>';}).join('')+'</select>';
  }
  html+='<select id="fVisitador" onchange="window._visFiltros.vis=this.value;renderCurrentTab()"><option value="">Todos los visitadores</option>'
    +D.users.filter(function(u){return u.role==='visitor'&&(!currentLabId||u.labId===currentLabId);})
    .map(function(u){return '<option value="'+u.id+'"'+(u.id===window._visFiltros.vis?' selected':'')+'>'+esc(u.name)+'</option>';}).join('')
    +'</select>'
    +'<div style="display:flex;gap:6px;">'
    +'<button class="btn btn-sm btn-outline" onclick="window._visFiltros={desde:\''+hoy+'\',hasta:\''+hoy+'\',lab:\'\',vis:\'\'};renderCurrentTab()">Hoy</button>'
    +'<button class="btn btn-sm btn-outline" onclick="(function(){var d=new Date();d.setDate(d.getDate()-6);window._visFiltros.desde=d.toISOString().slice(0,10);window._visFiltros.hasta=\''+hoy+'\';renderCurrentTab();})()">7 días</button>'
    +'<button class="btn btn-sm btn-outline" onclick="(function(){var d=new Date();d.setDate(d.getDate()-29);window._visFiltros.desde=d.toISOString().slice(0,10);window._visFiltros.hasta=\''+hoy+'\';renderCurrentTab();})()">30 días</button>'
    +'</div></div>';

  // Filtrar
  var desde=window._visFiltros.desde;
  var hasta=window._visFiltros.hasta;
  var lab=window._visFiltros.lab;
  var vis=window._visFiltros.vis;
  var filtradas=visits.filter(function(v){
    if(desde&&v.date<desde) return false;
    if(hasta&&v.date>hasta) return false;
    if(lab&&v.labId!==lab) return false;
    if(vis&&(v.visitorId||v.userId)!==vis) return false;
    return v.status==='completed';
  });
  filtradas.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});

  if(!filtradas.length) return html+'<div class="empty"><i class="fa-solid fa-route"></i><p>Sin visitas en el periodo</p></div>';

  html+='<div class="table-wrap"><table class="data-table"><thead><tr>'
    +'<th>Visitador</th><th>Laboratorio</th><th>Punto</th><th>Jefe</th><th>Notas</th><th>Fecha</th><th>Estado</th><th>Ubicación</th><th>Foto</th>'
    +'</tr></thead><tbody>'
    +filtradas.map(function(v){
      var visName=getUserName(v.visitorId||v.userId);
      var labName=getLabName(v.labId);
      var punto=v.pointName||v.placeName||'-';
      var estado=v.status==='completed'?'<span class="badge badge-ok">Completada</span>':v.status==='in-progress'?'<span class="badge badge-warn">En curso</span>':'<span class="badge badge-info">Pendiente</span>';
      var foto=v.photo?'<button class="btn btn-sm btn-outline" onclick="openFoto(\''+v.photo+'\')"><i class="fa-solid fa-image"></i></button>':'-';
      var ubicacion=(v.lat&&v.lng)?'<a href="https://www.google.com/maps?q='+v.lat+','+v.lng+'" target="_blank" class="btn btn-sm btn-outline"><i class="fa-solid fa-location-dot"></i></a>':'-';
      return '<tr><td><b>'+esc(visName)+'</b></td><td>'+esc(labName)+'</td><td>'+esc(punto)+'</td><td>'+esc(v.jefe||'-')+'</td><td>'+(v.notes?'<span title="'+esc(v.notes)+'" style="cursor:help;">'+esc(v.notes.substring(0,30))+(v.notes.length>30?'...':'')+'</span>':'-')+'</td><td>'+fmtDate(v.date)+'</td><td>'+estado+'</td><td>'+ubicacion+'</td><td>'+foto+'</td></tr>';
    }).join('')
    +'</tbody></table></div>';

  return html;
}

    return u.role==='visitor'&&(!currentLabId||u.labId===currentLabId);
  });
  if(!visitors.length) return '<div class="empty"><i class="fa-solid fa-users"></i><p>Sin visitadores</p></div>';

  var hoy=today();
  var html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;">';
  visitors.forEach(function(v){
    var visitas=D.visits.filter(function(x){return (x.visitorId||x.userId)===v.id;});
    var hoyV=visitas.filter(function(x){return x.date===hoy;});
    var completadasHoy=hoyV.filter(function(x){return x.status==='completed';}).length;
    var totalPuntos=D.points.filter(function(p){return p.assignedTo===v.id;}).length;

    html+='<div class="card">'
      +'<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">'
      +'<div class="avatar" style="background:'+color+'">'+initials(v.name)+'</div>'
      +'<div><div style="font-weight:700;">'+esc(v.name)+'</div>'
      +'<div style="font-size:12px;color:var(--muted);">'+esc(v.username)+' · <span style="color:'+labObj.color+';font-weight:600;">'+esc(labObj.name)+'</span></div></div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">'
      +'<div style="background:var(--primary-50);border-radius:10px;padding:8px;"><div style="font-size:20px;font-weight:900;color:var(--primary);">'+completadasHoy+'</div><div style="font-size:10px;color:var(--muted);">Hoy</div></div>'
      +'<div style="background:#F0FDF4;border-radius:10px;padding:8px;"><div style="font-size:20px;font-weight:900;color:#16A34A;">'+visitas.length+'</div><div style="font-size:10px;color:var(--muted);">Total</div></div>'
      +'<div style="background:#FEF3C7;border-radius:10px;padding:8px;"><div style="font-size:20px;font-weight:900;color:#D97706;">'+pct+'%</div><div style="font-size:10px;color:var(--muted);">Cumpl.</div></div>'
      +'</div></div>';
  });
  html+='</div>';
  return html;
}

// ── TAB PENDIENTES ────────────────────────────────────────────
function renderPendientes(){
  var pends=D.pendientes.filter(function(p){
    if(!p||!p.id||p.eliminado) return false;
    if(!currentLabId) return true;
    if(p.labId) return p.labId===currentLabId;
    var u=D.users.find(function(x){return x.id===p.userId;});
    return u&&u.labId===currentLabId;
  });
  var activos=pends.filter(function(p){return !p.resuelto;});
  var resueltos=pends.filter(function(p){return p.resuelto===true;});

  var html='<div class="stats-grid">'
    +'<div class="stat-card"><div class="stat-num">'+activos.length+'</div><div class="stat-label">Activos</div></div>'
    +'<div class="stat-card"><div class="stat-num">'+resueltos.length+'</div><div class="stat-label">Resueltos</div></div>'
    +'</div>';

  html+='<div style="display:flex;justify-content:flex-end;margin-bottom:14px;">'
    +'<button class="btn btn-primary btn-sm" onclick="abrirModalCrearPendiente()"><i class="fa-solid fa-plus"></i> Nuevo pendiente</button>'
    +'</div>';

  if(!activos.length) return html+'<div class="empty"><i class="fa-solid fa-list-check"></i><p>Sin pendientes activos</p></div>';

  // Ordenar por prioridad: urgente/alta primero
  var ordenPrio={urgente:0,alta:0,semana:1,normal:2,baja:3};
  activos=activos.slice().sort(function(a,b){return (ordenPrio[a.prioridad]!=null?ordenPrio[a.prioridad]:2)-(ordenPrio[b.prioridad]!=null?ordenPrio[b.prioridad]:2);});

  html+='<div class="table-wrap"><table class="data-table"><thead><tr>'
    +'<th>Visitador</th><th>Pendiente</th><th>Prioridad</th><th>Creado por</th><th>Fecha límite</th><th>Acciones</th>'
    +'</tr></thead><tbody>'
    +activos.map(function(p){
      var visName=getUserName(p.userId);
      var prio=(p.prioridad==='urgente'||p.prioridad==='alta')?'<span class="badge badge-err">'+(p.prioridad==='urgente'?'Urgente':'Alta')+'</span>'
        :p.prioridad==='semana'?'<span class="badge badge-warn">Esta semana</span>'
        :p.prioridad==='baja'?'<span class="badge badge-ok">Baja</span>'
        :'<span class="badge badge-warn">Normal</span>';
      var creadoPorVisitador=p.creadoPor===p.userId;
      var creador=creadoPorVisitador?'<span style="color:var(--muted);">Visitador</span>':esc(p.creadoPorNombre||'-');
      return '<tr><td><b>'+esc(visName)+'</b></td><td>'+esc(p.texto)+'</td><td>'+prio+'</td><td>'+creador+'</td><td>'+fmtDate(p.fechaLimite)+'</td>'
        +'<td style="white-space:nowrap;">'
        +'<button class="action-btn action-btn-success" style="margin-right:4px;" data-id="'+p.id+'" onclick="resolverPendienteAdmin(this.dataset.id)"><i class="fa-solid fa-check"></i> Resolver</button>'
        +'<button class="action-btn action-btn-danger" data-id="'+p.id+'" onclick="eliminarPendienteAdmin(this.dataset.id)"><i class="fa-solid fa-trash"></i></button>'
        +'</td></tr>';
    }).join('')
    +'</tbody></table></div>';
  return html;
}

function resolverPendienteAdmin(pid){
  var p=D.pendientes.find(function(x){return x.id===pid;});
  if(!p) return;
  p.resuelto=true;
  p.resueltoAt=new Date().toISOString();
  p.ocultoVisitador=true;
  var save=function(){
    db.ref('medvisit/pendientes/'+p._fbKey).set(p)
      .then(function(){toast('Pendiente resuelto');renderCurrentTab();})
      .catch(function(e){toast('Error: '+e.message,'err');p.resuelto=false;});
  };
  if(p._fbKey) save();
  else {
    db.ref('medvisit/pendientes').orderByChild('id').equalTo(pid).once('value',function(snap){
      snap.forEach(function(c){p._fbKey=c.key;});
      save();
    });
  }
}

function abrirModalCrearPendiente(){
  var modal=document.getElementById('modalCrearPendiente');
  if(!modal){
    modal=document.createElement('div');
    modal.id='modalCrearPendiente';
    modal.className='modal-overlay';
    modal.innerHTML='<div class="modal-box">'
      +'<div class="modal-title">Nuevo pendiente</div>'
      +'<div class="form-group"><label class="form-label">Visitador</label><select class="form-input" id="cp-visitor"></select></div>'
      +'<div class="form-group"><label class="form-label">Pendiente</label><textarea class="form-input" id="cp-texto" placeholder="Describe el pendiente..."></textarea></div>'
      +'<div class="form-group"><label class="form-label">Prioridad</label><select class="form-input" id="cp-prioridad"><option value="normal">Normal</option><option value="semana">Esta semana</option><option value="urgente">Urgente</option></select></div>'
      +'<div class="form-group"><label class="form-label">Fecha límite</label><input class="form-input" type="date" id="cp-fecha"></div>'
      +'<div class="modal-actions">'
      +'<button class="btn btn-outline" onclick="closeModal(&quot;modalCrearPendiente&quot;)">Cancelar</button>'
      +'<button class="btn btn-primary" onclick="crearPendienteAdmin()"><i class="fa-solid fa-plus"></i> Crear</button>'
      +'</div></div>';
    document.body.appendChild(modal);
  }
  var sel=document.getElementById('cp-visitor');
  var visitors=D.users.filter(function(u){return u.role==='visitor'&&(!currentLabId||u.labId===currentLabId);});
  sel.innerHTML=visitors.map(function(u){return '<option value="'+u.id+'">'+esc(u.name)+' ('+esc(getLabName(u.labId))+')</option>';}).join('');
  document.getElementById('cp-texto').value='';
  document.getElementById('cp-prioridad').value='normal';
  document.getElementById('cp-fecha').value='';
  openModal('modalCrearPendiente');
}

function crearPendienteAdmin(){
  var userId=document.getElementById('cp-visitor').value;
  var texto=document.getElementById('cp-texto').value.trim();
  var prioridad=document.getElementById('cp-prioridad').value;
  var fechaLimite=document.getElementById('cp-fecha').value;
  if(!userId||!texto){toast('Selecciona visitador y escribe el pendiente','err');return;}
  var u=D.users.find(function(x){return x.id===userId;});
  var p={
    id:'pnd_'+Date.now()+'_'+Math.random().toString(36).substr(2,4),
    userId:userId,texto:texto,prioridad:prioridad,fechaLimite:fechaLimite||'',
    labId:u?u.labId||'':'',creadoPor:currentUser.id,creadoPorNombre:currentUser.name,
    creadoAt:new Date().toISOString(),resuelto:false,resueltoAt:null,ocultoVisitador:false,eliminado:false
  };
  var ref=db.ref('medvisit/pendientes').push();
  p._fbKey=ref.key;
  ref.set(p)
    .then(function(){toast('Pendiente creado');closeModal('modalCrearPendiente');})
    .catch(function(e){toast('Error: '+e.message,'err');});
}

// ── TAB AUSENCIAS ────────────────────────────────────────────
function renderAusencias(){
  var ausencias=D.ausencias.filter(function(a){
    if(!a||!a.id) return false;
    return !currentLabId||a.labId===currentLabId;
  });
  ausencias.sort(function(a,b){return (b.creadoAt||'').localeCompare(a.creadoAt||'');});
  var pendRev=ausencias.filter(function(a){return !a.revisado;});
  var revisadas=ausencias.filter(function(a){return a.revisado;});

  var html='<div class="stats-grid">'

function marcarAusenciaRevisada(aid){
  var a=D.ausencias.find(function(x){return x.id===aid;});
  if(!a) return;
  a.revisado=true;
  a.revisadoPor=currentUser.name;
  a.revisadoAt=new Date().toISOString();
  var save=function(){
    db.ref('medvisit/ausencias/'+a._fbKey).set(a)
      .then(function(){toast('Marcada como revisada');renderCurrentTab();})
      .catch(function(e){toast('Error: '+e.message,'err');a.revisado=false;});
  };
  if(a._fbKey) save();
  else {
    db.ref('medvisit/ausencias').orderByChild('id').equalTo(aid).once('value',function(snap){
      snap.forEach(function(c){a._fbKey=c.key;});
      save();
    });
  }
}

function eliminarAusencia(aid){
  var a=D.ausencias.find(function(x){return x.id===aid;});
  if(!a) return;
  showConfirm('Eliminar ausencia','¿Eliminar este registro de ausencia? No se puede deshacer.','fa-trash','danger',function(){
    var doDelete=function(){
      db.ref('medvisit/ausencias/'+a._fbKey).remove()
        .then(function(){toast('Ausencia eliminada');D.ausencias=D.ausencias.filter(function(x){return x.id!==aid;});renderCurrentTab();})
        .catch(function(e){toast('Error: '+e.message,'err');});
    };
    if(a._fbKey) doDelete();
    else {
      db.ref('medvisit/ausencias').orderByChild('id').equalTo(aid).once('value',function(snap){
        snap.forEach(function(c){a._fbKey=c.key;});
        doDelete();
      });
    }
  });
}

// ── EXPORTAR EXCEL MARKETING ──────────────────────────────────
function exportarExcelMarketing(){
  var filtered=D.marketing.filter(function(r){
    if(!r||!r.fecha) return false;
    if(_mktFiltros.lab&&r.labId!==_mktFiltros.lab) return false;
    if(_mktFiltros.vis&&r.userId!==_mktFiltros.vis) return false;
    if(_mktFiltros.desde&&r.fecha<_mktFiltros.desde) return false;
    if(_mktFiltros.hasta&&r.fecha>_mktFiltros.hasta) return false;
    if(currentLabId&&r.labId!==currentLabId) return false;
    return true;
  });
  if(!filtered.length){toast('Sin datos para exportar','err');return;}
  toast('Generando Excel...','ok');
  // Cargar XLSX
  function doExport(){
    try{
      var header=['Fecha','Visitador','Laboratorio','Establecimiento','NIT','Razon Social','Valor'];
      var rows=[];
      for(var i=0;i<filtered.length;i++){
        var r=filtered[i];
        rows.push([
          r.fecha||'',
          r.userName||getUserName(r.userId)||'',
          getLabName(r.labId)||'',
          r.lugar||'',
          r.nit||'',
          r.razonSocial||'',
          parseFloat(r.valor)||0
        ]);
      }
      var total=0;
      for(var j=0;j<rows.length;j++) total+=rows[j][6];
      rows.push(['','','','','','TOTAL',total]);
      var wb=XLSX.utils.book_new();
      var ws=XLSX.utils.aoa_to_sheet([header].concat(rows));
      ws['!cols']=[{wch:12},{wch:22},{wch:14},{wch:28},{wch:16},{wch:30},{wch:14}];
      XLSX.utils.book_append_sheet(wb,ws,'Marketing');
      XLSX.writeFile(wb,'Marketing_APPMED_'+today()+'.xlsx');
    }catch(err){
      console.error('Excel error:',err);
      toast('Error al generar Excel: '+err.message,'err');
    }
  }
  if(typeof XLSX==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js';
    s.onload=doExport;
    document.head.appendChild(s);
  } else {
    doExport();
  }
}

function tryRestoreSession(){
  try{
    var sess=localStorage.getItem('appmed_admin_session');
    if(!sess) return;
    var s=JSON.parse(sess);
    if(!s||!s.userId) return;
    if(s.userId==='__super__'){
      currentUser={id:'__super__',role:'super',name:'Super Administrador',username:'superadmin'};
      enterAdmin();return;
    }
    var u=D.users.find(function(x){return x.id===s.userId&&x.active!==false;});
    if(!u) return;
    currentUser={id:u.id,role:u.role,name:u.name,username:u.username,labId:u.labId||''};
    currentLabId=u.role==='admin'?u.labId||null:null;
    enterAdmin();
  }catch(e){console.error('Session restore:',e);}
}

function _generarExcel(labId){
  var desde=rptDesde;
  var hasta=rptHasta||today();
  // Si solo es hoy o no hay rango definido, usar últimos 30 días para el informe
  if(!desde||desde===hasta){
    var d30=new Date();d30.setDate(d30.getDate()-29);
    desde=d30.toISOString().slice(0,10);
  }
  var visits=D.visits.filter(function(v){
    if(labId&&v.labId!==labId) return false;
    if(!labId&&currentLabId&&v.labId!==currentLabId) return false;
    if(v.date<desde) return false;
    if(v.date>hasta) return false;
    return v.status==='completed';
  });
  var wb=XLSX.utils.book_new();
  // Hoja 1: Visitas
  var header=['Fecha','Visitador','Laboratorio','Tipo','Punto / Profesional','Especialidad','Telefono','Direccion','Obsequio','Firma','Notas'];
  var rows=visits.map(function(v){
    var u=D.users.find(function(x){return x.id===(v.visitorId||v.userId);})||{};
    var lab=LABS.find(function(l){return l.id===v.labId;})||{};
    var isProf=v.type==='profesional';
    return [v.date||'',u.name||'',lab.name||'',isProf?'Profesional':'General',
      isProf?v.placeName||'':v.pointName||v.placeName||'',
      v.speciality||'',v.phone||'',isProf?v.address||'':v.direccion||'',
      v.gift||'',v.firma?'Si':'No',v.notes||''];
  });
  var ws1=XLSX.utils.aoa_to_sheet([header].concat(rows));
  ws1['!cols']=[{wch:12},{wch:22},{wch:14},{wch:12},{wch:30},{wch:18},{wch:14},{wch:28},{wch:20},{wch:6},{wch:28}];
  XLSX.utils.book_append_sheet(wb,ws1,'Visitas');
  // Hoja 2: Pendientes (todos, sin filtro de fecha — son acumulativos)
  var pends=D.pendientes.filter(function(p){
    if(!p||!p.id) return false;
    if(labId){var u=D.users.find(function(x){return x.id===p.userId;});return u&&u.labId===labId;}
    return true;
  });
  var hPend=['Visitador','Pendiente','Prioridad','Estado','Creado por','Fecha limite','Resuelto en'];
  var rPend=pends.map(function(p){
    return [getUserName(p.userId),p.texto||'',p.prioridad||'normal',
      p.eliminado?'Eliminado':p.resuelto?'Resuelto':'Activo',
      p.creadoPorNombre||'',p.fechaLimite||'',p.resueltoAt?p.resueltoAt.split('T')[0]:''];
  });
  var ws2=XLSX.utils.aoa_to_sheet([hPend].concat(rPend));
  XLSX.utils.book_append_sheet(wb,ws2,'Pendientes');
  // Hoja 3: Ausencias del periodo
  var ausAll=D.ausencias.filter(function(a){
    if(!a||!a.id) return false;
    if(a.fecha<desde) return false;
    if(a.fecha>hasta) return false;
    if(labId) return a.labId===labId;
    return true;
  });
  var motivoLbl={incapacidad:'Incapacidad médica',calamidad:'Calamidad doméstica',cita_medica:'Cita médica',admin:'Autorizada por admin',otro:'Otro'};
  var hAus=['Fecha','Visitador','Laboratorio','Motivo','Detalle','Estado','Revisado por'];
  var rAus=ausAll.map(function(a){
    return [a.fecha||'',a.userName||getUserName(a.userId),getLabName(a.labId),
      motivoLbl[a.motivo]||a.motivo||'',a.detalle||'',
      a.revisado?'Revisada':'Sin revisar',a.revisadoPor||''];
  });
  var ws3=XLSX.utils.aoa_to_sheet([hAus].concat(rAus));
  ws3['!cols']=[{wch:12},{wch:22},{wch:14},{wch:22},{wch:40},{wch:14},{wch:22}];
  XLSX.utils.book_append_sheet(wb,ws3,'Ausencias');
  var nombre='Visitas_APPMED_'+(labId?getLabName(labId):'General')+'_'+today()+'.xlsx';
  var wbout=XLSX.write(wb,{bookType:'xlsx',type:'buffer'});
  var blob=new Blob([wbout],{type:'application/octet-stream'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=nombre;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function generarExcelMarketing(periodo){

  else if(periodo==='2semanas') desde.setDate(ahora.getDate()-14);

    if(!r||!r.fecha) return false;

  });
  if(!filtered.length){toast('Sin datos en ese periodo','err');return;}
  window._mktPendingRows2={rows:filtered,desde:desdeStr,hasta:hastaStr};
  if(typeof XLSX==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js';

    document.head.appendChild(s);

}

function _doExportMktPeriodo(rows,desde,hasta){
  var header=['Fecha','Visitador','Laboratorio','Establecimiento','NIT','Razon Social','Valor ($)'];
  var data=rows.map(function(r){
    return [r.fecha||'',r.userName||getUserName(r.userId),getLabName(r.labId),r.lugar||'',r.nit||'',r.razonSocial||'',parseFloat(r.valor)||0];
  });
  // Limpiar fotos para no saturar el Excel
  data=data.map(function(row){return row.map(function(cell){return typeof cell==='string'&&cell.length>500?'[foto]':cell;});});
  var total=data.reduce(function(s,r){return s+r[6];},0);
  data.push(['','','','','','TOTAL','$'+total.toLocaleString('es-CO')]);
  var ws=XLSX.utils.aoa_to_sheet([header].concat(data));
  ws['!cols']=[{wch:12},{wch:22},{wch:14},{wch:28},{wch:16},{wch:30},{wch:14}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Marketing');
  var wbout=XLSX.write(wb,{bookType:'xlsx',type:'buffer'});
  var blob=new Blob([wbout],{type:'application/octet-stream'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='Marketing_APPMED_'+desde+'_al_'+hasta+'.xlsx';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// ── RENDERIZAR GRAFICA A IMAGEN (para PPTX) ────────────────────
function chartToImage(config, width, height){
  width=width||600;height=height||350;
  var canvas=document.createElement('canvas');
  canvas.width=width;canvas.height=height;
  config.options=config.options||{};
  config.options.responsive=false;
  config.options.animation=false;
  config.options.devicePixelRatio=2;
  var chart=new Chart(canvas,config);
  var dataUrl=canvas.toDataURL('image/png');
  chart.destroy();
  return dataUrl;
}

function _generarPPTX(labId){
  var lab=labId?LABS.find(function(l){return l.id===labId;})||{name:'General',color:'#0303B5'}:{name:'General',color:'#0303B5'};
  var visits=D.visits.filter(function(v){
    if(labId&&v.labId!==labId) return false;
    if(!labId&&currentLabId&&v.labId!==currentLabId) return false;
    if(rptDesde&&v.date<rptDesde) return false;
    if(rptHasta&&v.date>rptHasta) return false;
    return v.status==='completed';
  });
  var pptx=new PptxGenJS();
  pptx.layout='LAYOUT_WIDE';
  // Slide 1: Portada

function previewExcelRuta(input){
  if(!input.files||!input.files[0]) return;
  window._excelPendingFile=input.files[0];
  if(typeof XLSX==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js';
    s.onload=function(){_previewExcelRuta();};
    document.head.appendChild(s);
  } else { _previewExcelRuta(); }
}

function _previewExcelRuta(){
  var file=window._excelPendingFile;
  if(!file){toast('Selecciona un archivo','err');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      // Reusar la misma lógica de detección de días que _previewExcel
      var headerRow=-1,dayCols={};
      for(var r=0;r<Math.min(10,raw.length);r++){
        var row=raw[r];
        var hasDays=row.some(function(c){
          var s=String(c||'').toUpperCase();
          return s.indexOf('LUNES')>=0||s.indexOf('MARTES')>=0||s.indexOf('MIERCOLES')>=0||s.indexOf('MIÉRCOLES')>=0||s.indexOf('JUEVES')>=0||s.indexOf('VIERNES')>=0||s.indexOf('SABADO')>=0||s.indexOf('SÁBADO')>=0||s.indexOf('DIA')>=0||s.indexOf('DÍA')>=0;
        });
        if(hasDays){
          headerRow=r;
          row.forEach(function(c,i){
            if(c&&String(c).trim()){
              var s=String(c).toUpperCase();
              if(s.indexOf('LUNES')>=0||s.indexOf('MARTES')>=0||s.indexOf('MIERCOLES')>=0||s.indexOf('MIÉRCOLES')>=0||s.indexOf('JUEVES')>=0||s.indexOf('VIERNES')>=0||s.indexOf('SABADO')>=0||s.indexOf('SÁBADO')>=0||s.indexOf('DIA')>=0||s.indexOf('DÍA')>=0){
                dayCols[i]=String(c).trim();
              }
            }
          });
          break;
        }
      }
      if(headerRow<0){toast('Formato no reconocido. Usa días en columnas (Lunes, Martes...).','err');return;}
      // Contar puntos por ruta
      var rutaCount={};
      var totalPuntos=0;
      var r2=headerRow+1;
      while(r2<raw.length){
        var numVal=raw[r2][0];
        if(numVal!==''&&!isNaN(parseInt(numVal))){
          Object.keys(dayCols).forEach(function(col){
            var nombre=String(raw[r2][parseInt(col)]||'').trim();
            if(nombre){
              var ruta=dayCols[col];
              if(!rutaCount[ruta]) rutaCount[ruta]=0;
              rutaCount[ruta]++;
              totalPuntos++;
            }
          });
        }
        r2++;
      }
      if(!totalPuntos){toast('No se encontraron puntos en el archivo','err');return;}
      // Guardar para uso posterior
      window._excelData=raw;
      window._excelDayCols=dayCols;
      window._excelHeaderRow=headerRow;
      var prev=document.getElementById('ar-preview');
      if(prev){
        var resumen=Object.keys(rutaCount).map(function(r){return '<b>'+esc(r)+'</b>: '+rutaCount[r]+' puntos';}).join(' · ');
        prev.innerHTML='<div style="background:#DCFCE7;border-radius:8px;padding:10px;margin-top:8px;color:#166534;">'
          +'<i class="fa-solid fa-check"></i> <b>'+totalPuntos+' puntos detectados</b><br>'
          +'<span style="font-size:11px;">'+resumen+'</span></div>';
      }
    }catch(err){
      toast('Error leyendo Excel: '+err.message,'err');
    }
  };
  reader.readAsArrayBuffer(file);
}

function previewExcel(input){
  if(!input.files||!input.files[0]) return;
  // Guardar el archivo ANTES de cargar XLSX (el evento change se pierde si se espera)
  window._excelPendingFile=input.files[0];
  if(typeof XLSX==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js';
    s.onload=function(){_previewExcel();};
    document.head.appendChild(s);
  } else { _previewExcel(); }
}

function _previewExcel(){
  var file=window._excelPendingFile;
  if(!file){toast("Selecciona un archivo Excel","err");return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      // Detectar fila con días
      var headerRow=-1,dayCols={};
      for(var r=0;r<Math.min(10,raw.length);r++){
        var row=raw[r];
        var hasDays=row.some(function(c){
          var s=String(c||'').toUpperCase();
          return s.indexOf('LUNES')>=0||s.indexOf('MARTES')>=0||s.indexOf('MIERCOLES')>=0||s.indexOf('JUEVES')>=0||s.indexOf('VIERNES')>=0||s.indexOf('SABADO')>=0||s.indexOf('DIA')>=0;
        });
        if(hasDays){
          headerRow=r;
          row.forEach(function(c,i){
            if(c&&String(c).trim()){
              var s=String(c).toUpperCase();
              if(s.indexOf('LUNES')>=0||s.indexOf('MARTES')>=0||s.indexOf('MIERCOLES')>=0||s.indexOf('JUEVES')>=0||s.indexOf('VIERNES')>=0||s.indexOf('SABADO')>=0||s.indexOf('DIA')>=0){
                dayCols[i]=String(c).trim();
              }
            }
          });
          break;
        }
      }
      if(headerRow<0){toast('Formato no reconocido. Usa días en columnas.','err');return;}
      window._excelRoutes={};
      Object.keys(dayCols).forEach(function(col){window._excelRoutes[col]=[];});
      var r2=headerRow+1;
      while(r2<raw.length){
        var numVal=raw[r2][0];
        if(numVal!==''&&!isNaN(parseInt(numVal))){
          var order=parseInt(numVal);
          var nameRow=raw[r2];
          var nextRow=raw[r2+1]||[];
          var addrRow=raw[r2+2]||[];
          var nextHasAddr=Object.keys(dayCols).some(function(col){
            var v=String(nextRow[parseInt(col)]||'');
            return v.match(/#|Calle|Cra|Carrera|Av|Km/i);
          });
          var skip=nextHasAddr?2:3;
          if(!nextHasAddr) addrRow=raw[r2+2]||[];
          else addrRow=nextRow;
          Object.keys(dayCols).forEach(function(col){
            var name=nameRow[parseInt(col)]||'';
            var addr=addrRow[parseInt(col)]||'';
            if(String(name).trim()&&String(name).trim()!=='nan'){
              window._excelRoutes[col].push({order:order,name:String(name).trim(),address:String(addr).trim()});
            }
          });
          r2+=skip;
        } else {r2++;}
      }
      var totalPts=Object.values(window._excelRoutes).reduce(function(s,a){return s+a.length;},0);
      var prevEl=document.getElementById('excelPreviewArea');
      prevEl.style.display='block';
      prevEl.innerHTML='<div style="background:var(--primary-50);border-radius:10px;padding:12px;font-size:13px;">'
        +'<b>'+totalPts+' puntos</b> en <b>'+Object.keys(dayCols).length+' rutas</b> detectadas:<br>'
        +Object.keys(dayCols).map(function(col){return dayCols[col]+': '+window._excelRoutes[col].length+' pts';}).join(' · ')
        +'</div>';
      document.getElementById('excelImportBtn').disabled=false;
      // Guardar nombres de rutas
      window._excelDayCols=dayCols;
    }catch(err){toast('Error leyendo Excel: '+err.message,'err');}
  };
  reader.readAsArrayBuffer(file);
}

function importarDesdeExcel(){
  var visitorId=document.getElementById('excelVisitorId').value;
  if(!visitorId||!window._excelRoutes||!Object.keys(window._excelRoutes).length){toast('Selecciona un visitador y archivo','err');return;}
  var visitor=D.users.find(function(u){return u.id===visitorId;})||{};
  var ciudad=(document.getElementById('excelCiudad')||{}).value||'Bogotá';
  var labId=visitor.labId||currentLabId||'';
  var allPts=[];
  var dayCols=window._excelDayCols||{};
  Object.keys(window._excelRoutes).forEach(function(col){
    var routeName=dayCols[col]||col;
    window._excelRoutes[col].forEach(function(pt){
      allPts.push({
        id:'pt_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),
        name:pt.name,address:pt.address,city:ciudad,routeName:routeName,
        order:pt.order,assignedTo:visitorId,labId:labId,
        lat:4.710989,lng:-74.072092,approved:true
      });
    });
  });
  closeModal('modalCargaExcel');
  toast('Importando '+allPts.length+' puntos...');
  // Agregar al array local y guardar en Firebase
  allPts.forEach(function(pt){D.points.push(pt);});
  db.ref('medvisit/points').set(D.points)
    .then(function(){toast(allPts.length+' puntos importados ✓');})
    .catch(function(e){toast('Error: '+e.message,'err');});
}

// ── TOAST ──────────────────────────────────────────────────────
function toast(msg,type){
  type=type||'ok';
  var w=document.getElementById('toastWrap'),t=document.createElement('div');
  t.className='toast toast-'+type;
  var icon=type==='err'?'fa-circle-xmark':'fa-circle-check';
  t.innerHTML='<i class="fa-solid '+icon+'"></i><span>'+esc(msg)+'</span>';
  w.appendChild(t);
  setTimeout(function(){t.classList.add('out');setTimeout(function(){t.remove();},260);},3200);
}

// ── CONFIRM ────────────────────────────────────────────────────
var _confirmCb=null;
function showConfirm(title,msg,icon,type,cb){
  document.getElementById('confirmTitle').textContent=title;
  document.getElementById('confirmMsg').textContent=msg;
  document.getElementById('confirmIconI').className='fa-solid '+(icon||'fa-triangle-exclamation');
  document.getElementById('confirmIcon').className='confirm-icon '+(type==='danger'?'danger':'warning');
  var btn=document.getElementById('confirmOkBtn');
  btn.className='btn '+(type==='danger'?'btn-danger':'btn-primary');
  _confirmCb=cb;
  document.getElementById('confirmOverlay').classList.add('open');
}
function executeConfirm(){
  document.getElementById('confirmOverlay').classList.remove('open');
  document.body.style.overflow='';
  if(_confirmCb){_confirmCb();_confirmCb=null;}
}
function cancelConfirm(){
  document.getElementById('confirmOverlay').classList.remove('open');
  document.body.style.overflow='';
  _confirmCb=null;
}

  var pts=D.points.filter(function(p){return p.assignedTo===uid;});

  pts.forEach(function(p){var r=p.routeName||'Sin ruta';if(rutas.indexOf(r)<0)rutas.push(r);});

  var modal=document.getElementById('modalActualizarRuta');
  if(!modal){
    modal=document.createElement('div');
    modal.id='modalActualizarRuta';

function ejecutarActualizarRuta(){
  var uid=window._arUid;
  var tipo=window._arTipo;
  if(!uid){toast('Error interno','err');return;}
  if(!window._excelData||!window._excelDayCols){toast('Carga el archivo Excel primero','err');return;}
  var rutaReemplazar=tipo==='parcial'?document.getElementById('ar-ruta-select').value:null;

  // Filtrar puntos que NO son de la ruta a reemplazar
  var ptsRestantes=D.points.filter(function(p){
    if(p.assignedTo!==uid) return true;
    if(tipo==='total') return false;
    return (p.routeName||'Sin ruta')!==rutaReemplazar;
  });

  // Construir nuevos puntos usando el formato de días (igual que la carga masiva)
  var raw=window._excelData;
  var dayCols=window._excelDayCols;
  var headerRow=window._excelHeaderRow||0;
  var userLab=(D.users.find(function(u){return u.id===uid;})||{}).labId||'';
  var nuevos=[];
  var r=headerRow+1;
  while(r<raw.length){
    var numVal=raw[r][0];
    if(numVal!==''&&!isNaN(parseInt(numVal))){
      var order=parseInt(numVal);
      var nameRow=raw[r];
      var nextRow=raw[r+1]||[];
      var hasAddr=Object.keys(dayCols).some(function(col){
        var v=String(nextRow[parseInt(col)]||'');
        return v.match(/#|Calle|Cra|Carrera|Av|Km/i);
      });
      var addrRow=hasAddr?nextRow:(raw[r+2]||[]);
      var skip=hasAddr?2:3;
      Object.keys(dayCols).forEach(function(col){
        var nombre=String(nameRow[parseInt(col)]||'').trim();
        if(!nombre) return;
        var direccion=String(addrRow[parseInt(col)]||'').trim();
        // Si es parcial, solo incluir la ruta seleccionada
        if(tipo==='parcial'&&dayCols[col]!==rutaReemplazar) return;
        nuevos.push({
          id:'pt_'+Date.now()+'_'+Math.random().toString(36).substr(2,4)+'_'+nuevos.length,
          name:nombre,address:direccion,lat:null,lng:null,
          order:order,routeName:dayCols[col],
          assignedTo:uid,labId:userLab,inactive:false
        });
      });
      r+=skip;
    } else { r++; }
  }

  if(!nuevos.length){toast('El Excel no tiene puntos válidos','err');return;}

  var todosLosPuntos=ptsRestantes.concat(nuevos);

  showConfirm(
    tipo==='total'?'Reemplazar todas las rutas':'Reemplazar ruta "'+rutaReemplazar+'"',
    'Se cargarán '+nuevos.length+' puntos nuevos. ¿Continuar?',
    'fa-arrows-rotate','warn',
    function(){
      db.ref('medvisit/points').set(todosLosPuntos)
        .then(function(){
          toast('Ruta actualizada con '+nuevos.length+' puntos');
          closeModal('modalActualizarRuta');
          window._excelData=null;
          window._excelDayCols=null;
          document.getElementById('tabContent').innerHTML=renderGestionDetalle(uid);
        })
        .catch(function(e){toast('Error: '+e.message,'err');});
    }
  );
}

function saveLab(){
  var id=document.getElementById('ml-id').value;
  var name=document.getElementById('ml-name').value.trim();
  var color=document.getElementById('ml-color').value||'#0303B5';
  if(!name){toast('El nombre es obligatorio','err');return;}
  var c=color.replace(/^#/,'');
  var r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);
  var lr=Math.round(r+(255-r)*0.85),lg=Math.round(g+(255-g)*0.85),lb=Math.round(b+(255-b)*0.85);
  var colorLight='#'+lr.toString(16).padStart(2,'0')+lg.toString(16).padStart(2,'0')+lb.toString(16).padStart(2,'0');
  if(id){
    var baseIdx=BASE_LABS.findIndex(function(l){return l.id===id;});
    if(baseIdx>=0){BASE_LABS[baseIdx].name=name;BASE_LABS[baseIdx].color=color;BASE_LABS[baseIdx].colorLight=colorLight;}
    var dynIdx=D.labs.findIndex(function(l){return l.id===id;});
    if(dynIdx>=0){D.labs[dynIdx].name=name;D.labs[dynIdx].color=color;D.labs[dynIdx].colorLight=colorLight;}
    else if(baseIdx<0){toast('Lab no encontrado','err');return;}
  } else {
    var newId='lab_'+name.toLowerCase().replace(/[^a-z0-9]/g,'_')+'_'+Date.now();
    var newLab={id:newId,name:name,color:color,colorLight:colorLight,icon:'fa-flask'};

      .then(function(){toast('Laboratorio creado');closeModal('modalLab');})
      .catch(function(e){toast('Error: '+e.message,'err');});

  db.ref('medvisit/labs').set(D.labs)
    .then(function(){toast(id?'Laboratorio actualizado':'Laboratorio creado');closeModal('modalLab');})
    .catch(function(e){toast('Error: '+e.message,'err');});
}

var _chartInstances={};
function destroyChart(id){
  if(_chartInstances[id]){_chartInstances[id].destroy();delete _chartInstances[id];}
}
function renderInformesCharts(){
  if(typeof Chart==='undefined') return;
  var desde=rptDesde||today();
  var hasta=rptHasta||today();
  var labsToShow=currentLabId?LABS.filter(function(l){return l.id===currentLabId;}):LABS;
  var visitsInRange=D.visits.filter(function(v){
    return v.status==='completed'&&v.date>=desde&&v.date<=hasta&&(!currentLabId||v.labId===currentLabId);
  });

  // 1. Visitas por laboratorio
  var elLabs=document.getElementById('chartLabs');
  if(elLabs){
    destroyChart('chartLabs');
    var labCounts=labsToShow.map(function(l){
      return visitsInRange.filter(function(v){return v.labId===l.id;}).length;
    });
    _chartInstances['chartLabs']=new Chart(elLabs,{
      type:'bar',
      data:{labels:labsToShow.map(function(l){return l.name;}),
        datasets:[{label:'Visitas completadas',data:labCounts,
          backgroundColor:labsToShow.map(function(l){return l.color;}),borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,ticks:{precision:0}}}}
    });
  }

  // 2. Tendencia diaria
  var elTrend=document.getElementById('chartTrend');
  if(elTrend){
    destroyChart('chartTrend');
    // Generar lista de fechas entre desde y hasta (max 31 dias)
    var dates=[];
    var d0=new Date(desde+'T00:00:00');
    var d1=new Date(hasta+'T00:00:00');
    var diffDays=Math.max(1,Math.round((d1-d0)/86400000)+1);
    if(diffDays>31){
      // limitar a últimos 31 dias del rango
      d0=new Date(d1.getTime()-30*86400000);
      diffDays=31;
    }
    for(var i=0;i<diffDays;i++){
      var dd=new Date(d0.getTime()+i*86400000);
      dates.push(dd.toISOString().slice(0,10));
    }
    var trendCounts=dates.map(function(dt){
      return D.visits.filter(function(v){return v.status==='completed'&&v.date===dt&&(!currentLabId||v.labId===currentLabId);}).length;
    });
    _chartInstances['chartTrend']=new Chart(elTrend,{
      type:'line',
      data:{labels:dates.map(function(dt){return fmtDate(dt);}),
        datasets:[{label:'Visitas',data:trendCounts,borderColor:'#0303B5',
          backgroundColor:'rgba(3,3,181,0.1)',fill:true,tension:0.3,pointRadius:3}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,ticks:{precision:0}},x:{ticks:{maxRotation:60,minRotation:45}}}}
    });
  }

  // 3. Visitas por visitador (top 15)
  var elVis=document.getElementById('chartVisitadores');
  if(elVis){
    destroyChart('chartVisitadores');
    var visitors=D.users.filter(function(u){return u.role==='visitor'&&(!currentLabId||u.labId===currentLabId);});
    var visData=visitors.map(function(u){
      var c=visitsInRange.filter(function(v){return (v.visitorId||v.userId)===u.id;}).length;
      return {name:u.name,count:c,color:avatarColor(u.name||'')};
    }).sort(function(a,b){return b.count-a.count;}).slice(0,15);
    _chartInstances['chartVisitadores']=new Chart(elVis,{
      type:'bar',
      data:{labels:visData.map(function(v){return v.name;}),
        datasets:[{label:'Visitas completadas',data:visData.map(function(v){return v.count;}),
          backgroundColor:visData.map(function(v){return v.color;}),borderRadius:6}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{beginAtZero:true,ticks:{precision:0}}}}
    });
  }

  // 4. Cumplimiento por laboratorio (puntos completados hoy / total puntos)
  var elCump=document.getElementById('chartCumplimiento');
  if(elCump){
    destroyChart('chartCumplimiento');
    var hoy=today();
    var cumpData=labsToShow.map(function(l){
      var myUsers=D.users.filter(function(u){return u.role==='visitor'&&u.labId===l.id&&u.active!==false;});
      var totalPts=D.points.filter(function(p){return myUsers.some(function(u){return u.id===p.assignedTo;})&&!p.inactive;}).length;
      var done=D.visits.filter(function(v){return v.labId===l.id&&v.date===hoy&&v.status==='completed';}).length;
      return totalPts>0?Math.round(done/totalPts*100):0;
    });
    _chartInstances['chartCumplimiento']=new Chart(elCump,{
      type:'bar',
      data:{labels:labsToShow.map(function(l){return l.name;}),
        datasets:[{label:'% Cumplimiento hoy',data:cumpData,
          backgroundColor:labsToShow.map(function(l){return l.color;}),borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true,max:100,ticks:{callback:function(v){return v+'%';}}}}}
    });
  }
}

function generarExcelVisitador(uid){
